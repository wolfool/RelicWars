name: RelicWars
version: 1.0.0-SNAPSHOT
main: com.wolfool.relicwars.RelicWars
api-version: '1.21'
description: 유물 쟁탈전 마인크래프트 PvP 플러그인
author: wolfool
softdepend: [CraftEngine, BetterHud, BetterModel]

commands:
  relic:
    description: 유물 관리 명령어
    usage: /relic <give|take|transfer>
  team:
    description: 듀오 팀 관리 명령어
    usage: /team <invite|accept>

permissions:
  relicwars.admin:
    description: 관리자 명령어 권한
    default: op
