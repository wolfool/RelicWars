name: RelicWars
version: ${project.version}
main: com.wolfool.relicwars.RelicWars
api-version: '1.21'
description: 유물 쟁탈전 마인크래프트 PvP 플러그인
author: wolfool

commands:
  relic:
    description: RelicWars 유물 관리 명령어
    usage: /<command> <give|take|locate|info|reload>
    permission: relicwars.admin

  team:
    description: RelicWars 팀 관리 명령어
    usage: /<command> <invite|accept|leave|info>

permissions:
  relicwars.admin:
    description: RelicWars 관리자 권한 (유물 지급/회수/위치 확인)
    default: op
